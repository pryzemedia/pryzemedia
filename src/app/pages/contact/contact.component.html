<section class="contact bg-darker pt-5">
  <div class="container">
    <div class="row text-white">
      <div class="col my-5">
        <h2 class="ms-3 featurette-heading">Contact</h2>
        <hr class="title-divider" />
        <div class="card bg-blue-deep text-light">
          <div class="card-header">
            Contact PryzeMedia
          </div>
          <form (ngSubmit)="onSubmit()" #contactForm="ngForm">
          <div class="card-body bg-white text-dark">

              <!-- Name input -->
              <div class="mb-3">
                <label class="form-label" for="name">Name:</label>
                <input class="form-control" type="text" id="name" [(ngModel)]="user.name" name="name" required>
              </div>

              <!-- Email address input -->
              <div class="mb-3">
                <label class="form-label" for="email">Email:</label>
                <input class="form-control" type="email" id="email" [(ngModel)]="user.email" name="email" required>
              </div>

              <!-- Message input -->
              <div class="mb-3">
                <label class="form-label" for="message">Message:</label>
                <textarea class="form-control" id="message" [(ngModel)]="user.message"
                          name="message" rows="4" required></textarea>
              </div>

              <div *ngIf="submitStatus" class="alert mt-3" [ngClass]="submitStatus.includes('Sorry') ? 'alert-danger' : 'alert-success'">
                {{ submitStatus }}
              </div>

          </div>
            <div class="card-footer bg-blue-deep">
              <button class="btn btn-outline-light" type="submit" [disabled]="isSubmitting">
                {{ isSubmitting ? 'Sending...' : 'Submit' }}
              </button>
            </div>
        </form>
        </div>
      </div>
    </div>
  </div>
</section>
